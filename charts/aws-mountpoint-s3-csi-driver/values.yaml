# Default values for Mountpoint for Amazon S3 CSI Driver Helm chart.
# You can customize any values here during installation.

# Set to true if running on OpenShift/ROSA.
# If not set, auto-detects OpenShift where possible.
isOpenShift: null

image:
  # Our regional ECR repositories are labelled `eks/aws-s3-csi-driver`.
  # See https://docs.aws.amazon.com/eks/latest/userguide/add-ons-images.html for the per-region registry list.
  # Example: `602401143452.dkr.ecr.us-east-1.amazonaws.com/eks/aws-s3-csi-driver` for us-east-1.
  repository: public.ecr.aws/mountpoint-s3-csi-driver/aws-mountpoint-s3-csi-driver
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "v2.5.0"

node:
  kubeletPath: /var/lib/kubelet
  logLevel: 4
  seLinuxOptions:
    user: system_u
    type: super_t
    role: system_r
    level: s0
  serviceAccount:
    # Specifies whether a service account should be created
    create: true
    name: s3-csi-driver-sa
    # In daemonset mode, this SA is used only for Kubernetes API access (e.g. listing pods).
    # S3 access for driver-level credentials moves to the mounter SA (daemonsetMounters[].serviceAccount).
    # Specify the CSI Driver SA's role ARN if want to use driver-level IRSA,
    # see https://github.com/awslabs/mountpoint-s3-csi-driver/blob/main/docs/CONFIGURATION.md#aws-credentials for more details.
    # annotations:
    # "eks.amazonaws.com/role-arn": ""
  podLabels: {}
  nodeSelector: {}
  resources:
    requests:
      cpu: 10m
      memory: 40Mi
    limits:
      memory: 256Mi
  # Tolerates all taints and overrides defaultTolerations
  tolerateAllTaints: true
  defaultTolerations: true
  tolerations: []
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: eks.amazonaws.com/compute-type
                operator: NotIn
                values:
                  - fargate
                  - hybrid

sidecars:
  nodeDriverRegistrar:
    image:
      repository: public.ecr.aws/csi-components/csi-node-driver-registrar
      tag: v2.16.0-eksbuild.3
      pullPolicy: IfNotPresent
    env:
      - name: KUBE_NODE_NAME
        valueFrom:
          fieldRef:
            fieldPath: spec.nodeName
    volumeMounts:
      - name: plugin-dir
        mountPath: /csi
      - name: registration-dir
        mountPath: /registration
    resources: {}
  livenessProbe:
    image:
      repository: public.ecr.aws/csi-components/livenessprobe
      tag: v2.18.0-eksbuild.3
      pullPolicy: IfNotPresent
    volumeMounts:
      - mountPath: /csi
        name: plugin-dir
    resources: {}

# In daemonset mode, the controller only manages existing V2 mounts (cleanup, credential refresh)
# and does not spawn new Mountpoint Pods. New mounts go through the mounter DaemonSet.
controller:
  # Consider deploying the controller component to special nodes for controller components.
  # See https://github.com/awslabs/mountpoint-s3-csi-driver/blob/main/docs/INSTALL.md#configuring-nodeSelector-for-the-controller-component for more details.
  # For example:
  # nodeSelector:
  #   kubernetes.io/role: control-plane
  podLabels: {}
  serviceAccount:
    # Specifies whether a service account should be created
    create: true
    name: s3-csi-driver-controller-sa

# In daemonset mode new mounts do not use Mountpoint Pods.
mountpointPod:
  namespace: mount-s3
  # If creating the namespace yourself, review the namespace definition in this Helm chart to follow the best practices.
  # For example, this chart enforces that pods in the namespace are bound by the 'restricted' pod security standard.
  # This allows us to restrict the pods that the driver's node daemon has privileges to create.
  createNamespace: true
  priorityClassName: mount-s3-critical
  preemptingPriorityClassName: mount-s3-preempting-critical
  headroomPriorityClassName: mount-s3-headroom
  podLabels: {}

# Daemonset mode: run all Mountpoint processes on a node inside a single pre-placed DaemonSet pod.
# Eliminates scheduling failures caused by pod-count limits and resource exhaustion.
# Set daemonsetMode to true to enable. Pod-mode sections (controller, mountpointPod, experimental)
# are only used to maintain existing mounts when daemonset mode is enabled.
# Use daemonsetMounters to customize the mounter DaemonSet. If omitted or empty, defaults apply
# (maxMountsPerNode: 10, memory: 2Gi, no cache).
# Only a single daemonsetMounters entry is supported currently. Multiple entries for heterogeneous
# node configurations will be supported in a future release.
#
# Simplest enable (uses defaults):
#   helm install ... --set daemonsetMode=true
#
# Custom config:
#   daemonsetMode: true
#   daemonsetMounters:
#     - maxMountsPerNode: 10
#       resources:
#         requests:
#           memory: "20Gi"
#           cpu: "500m"
#       cache:
#         emptyDir: {}
#
# See docs/DAEMONSET_MODE.md for sizing guidance, upgrade procedure, and limitations.
daemonsetMode: false
daemonsetMounters: []
#
#   # --- Volume limits ---
#   # Maximum number of distinct S3 volumes (Mountpoint processes) per node.
#   # Advertised to the Kubernetes scheduler via MaxVolumesPerNode.
#   # Shared volumes (same PV used by multiple pods) are counted once.
#   # Default: 10.
#   # maxMountsPerNode: 10
#
#   # --- Mounter pod resources ---
#   # Resource requests and limits for the mounter DaemonSet pod.
#   # requests.memory should be sized to maxMountsPerNode × per-mount memory
#   # (e.g., 10 mounts × 2Gi = 20Gi).
#   # Default: memory: "2Gi".
#   # resources:
#   #   requests:
#   #     memory: "20Gi"
#   #     cpu: "500m"
#   #   # Optional hard limits. Use with caution:
#   #   # - memory limit: OOM kill terminates ALL mounts on the node.
#   #   # - cpu limit: throttles ALL mounts on the node collectively.
#   #   # limits:
#   #   #   memory: "24Gi"
#   #   #   cpu: "1"
#
#   # --- Cache ---
#   # Shared cache for all Mountpoint processes on the node.
#   # Each mount gets a dedicated subdirectory (/cache/<vol-id>/).
#   # Per-PV cache settings (--cache, --max-cache-size via volumeAttributes)
#   # remain configurable — but the underlying storage is shared.
#   # Omit to disable cache entirely.
#   # Presence of emptyDir or ephemeral key selects the cache volume type.
#   # cache:
#   #   emptyDir:
#   #     ephemeralStorageRequest: "100Gi"  # Scheduler reservation for cache disk on the node's root volume.
#   #                                      # See https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/#setting-requests-and-limits-for-local-ephemeral-storage
#   #     # sizeLimit: "100Gi"  # Optional. WARNING: exceeding sizeLimit triggers kubelet eviction
#   #     #                     # of the mounter pod, killing ALL mounts on the node.
#   #   # Alternative — ephemeral volume backed by a StorageClass (e.g. instance store, EBS):
#   #   # ephemeral:
#   #   #   storageClassName: gp2
#   #   #   storageRequest: "100Gi"
#
#   # --- Scheduling ---
#   # Defaults to the corresponding node.* values if not set.
#   # Override only if the mounter DaemonSet needs different scheduling than the CSI node plugin.
#   # nodeSelector: {}
#   # tolerations: []
#   # affinity: {}
#
#   # --- Metadata ---
#   # podLabels: {}
#
#   # --- Service account ---
#   # In daemonset mode, the node SA (node.serviceAccount) is used only for Kubernetes API
#   # access (e.g. listing pods), while the mounter SA below is used for S3 access
#   # when using driver-level credentials (IRSA / EKS Pod Identity).
#   # serviceAccount:
#   #   create: true
#   #   name: s3-csi-mounter-sa
#   #   annotations:
#   #     eks.amazonaws.com/role-arn: ""

nameOverride: ""
fullnameOverride: ""

customLabels: {}

imagePullSecrets: []

# AWS credentials from a Kubernetes Secret, provided as environment variables to the CSI node plugin
# and, in daemonset mode, also to Mountpoint processes in the mounter DaemonSet pod.
awsAccessSecret:
  name: aws-secret
  keyId: key_id
  accessKey: access_key
  sessionToken: session_token

# The default IPv4 address in the credentials URI is in accordance to the references below:
# Doc: https://docs.aws.amazon.com/eks/latest/userguide/pod-id-agent-setup.html
# Source code: https://github.com/aws/eks-pod-identity-agent/blob/8bd71a236522993f02427083e485c83f6ae4fe31/configuration/config.go
eksPodIdentityAgent:
  containerCredentialsFullURI: "http://169.254.170.23/v1/credentials"

# CSI Driver v2 only: If enabled, the driver will continue supporting S3 volumes that were mounted by v1 (SystemD mounts),
# including credential refresh, cleanup, and unmounting these legacy volumes.
# You can set this feature to false for fresh clusters with no v1 volumes,
# or if you've migrated all workloads using S3 volumes after upgrading to v2.
# TODO: Remove this in v3 as systemd mount support will be discontinued
supportLegacySystemDMounts: true

# In daemonset mode new mounts do not use Mountpoint Pods.
# Experimental features for the pod-based Mountpoint architecture.
experimental:
  # Enables support for `s3.csi.aws.com/reserve-headroom-for-mppod` scheduling gate on the Workload Pods.
  # See https://github.com/awslabs/mountpoint-s3-csi-driver/blob/main/docs/HEADROOM_FOR_MPPOD.md for more details.
  reserveHeadroomForMountpointPods: false
  headroomPodImage: public.ecr.aws/eks-distro/kubernetes/pause:3.10
  headroomPodLabels: {}
